name: ci-pipeline-tp

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov

      - name: Run flake8 (critical errors)
        run: flake8 app --count --select=E9,F63,F7,F82,F841 --show-source --statistics

      - name: Run tests
        run: PYTHONPATH=. pytest tests/ -v --cov=app