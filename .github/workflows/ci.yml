name : ci-pipeline-tp
on:
    push : 
        branches : [main]
    pull_request : 
        branches : [main]
    workflow_dispatch : 
jobs: 
    build:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v4
        - name: install python
          uses: actions/setup-python@v5
          with:
            python-version: "3.11"
        - name: Installer les dépendences
          run: pip install -r requirements.txt
        - name: Installer flake8
          run: pip install flake8
        - name: Lancer le linter
          run:  flake8 app --count --select=E9,F63,F7,F82,F841 --show-source --statistics | flake8 app --count --max-complexity=10 --max-ligne-length=127 --statistics | flake8 tests --count --max-ligne-length=127 --statistics
        - name: Lancer les tests
          run: pytest tests/ -v --cov=app