name: ci-pipeline-multi-jobs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # ----------------------------
  # Job 1 - Static Analysis
  # ----------------------------
  lint:
    name: Job 1 - Analyse statique (Lint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Exécuter flake8
        run: flake8 app tests --max-complexity=10 --max-line-length=127 --statistics


  # ----------------------------
  # Job 2 - Unit Testing
  # ----------------------------
  test:
    name: Job 2 - Tests unitaires
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Exécuter les tests
        run: PYTHONPATH=. pytest tests/ -v --cov=app


  # ----------------------------
  # Job 3 - Build Application
  # ----------------------------
  build:
    name: Job 3 - Build final
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Créer artifact build
        run: |
          mkdir build
          echo "Build réussi" > build/result.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: build/


  # ----------------------------
  # Job 4 - Security Scan
  # ----------------------------
  security:
    name: Job 4 - Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan sécurité Python
        run: |
          python -m pip install bandit
          bandit -r app


  # ----------------------------
  # Job 5 - Deployment
  # ----------------------------
  deploy:
    name: Job 5 - Deployment
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact

      - name: Deploy Simulation
        run: echo "Deployment simulé avec succès 🚀"